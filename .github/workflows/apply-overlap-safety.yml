name: Apply overlap safety patch

on:
  push:
    branches:
      - fix-overlapping-live-matches
    paths:
      - scripts/apply_overlap_safety_patch.py
      - .github/workflows/apply-overlap-safety.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-overlapping-live-matches
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r backend/requirements.txt
      - run: python scripts/apply_overlap_safety_patch.py
      - run: python -m py_compile backend/update_pipeline.py tests/test_update_overlap_guard.py
      - run: python -m unittest tests.test_update_overlap_guard -v
      - run: git diff --check
      - name: Commit applied safety changes
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/update_pipeline.py .github/workflows/update-cupmarket.yml
          if git diff --cached --quiet; then
            echo "Safety patch already applied."
          else
            git commit -m "Prevent partial updates during live matches"
            git push origin fix-overlapping-live-matches
          fi
