name: Update CupMarket data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Choose the safe result check or an advanced full recomputation
        required: true
        default: check
        type: choice
        options:
          - check
          - force
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: cupmarket-auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record source commit
        run: echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Validate repository package
        run: |
          test -f app.py
          test -f requirements.txt
          test -f data/cupmarket_prices_latest.csv
          test -f data/tournament_probabilities_latest.csv
          test -f data/current_group_tables.csv
          test -f backend/update_pipeline.py
          test -f backend/run_update_pipeline.py
          test -f backend/state/models/phase3_home_goal_model.joblib
          test -f backend/state/models/phase3_away_goal_model.joblib
          test -f backend/state/live_elo_ratings.csv
          test -f backend/state/live_team_state.csv
          test -f backend/state/world_cup_team_name_map.csv
          python -m py_compile app.py
          python -m py_compile backend/update_pipeline.py
          python -m py_compile backend/run_update_pipeline.py
          python -m py_compile features/market_movement.py
          python -m unittest tests/test_market_movement.py

      - name: Run CupMarket update pipeline
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          N_SIMULATIONS: "20000"
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'force' }}
        run: python backend/run_update_pipeline.py

      - name: Summarize update outcome
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("backend/state/last_automation_run.json")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "unknown")
          mode = os.environ.get("MANUAL_MODE", "scheduled")

          if not path.exists():
              heading = "FAILED"
              detail = "The pipeline did not write a run summary. Inspect the first failed step."
              payload = {}
          else:
              payload = json.loads(path.read_text(encoding="utf-8"))
              status = str(payload.get("status", "unknown"))
              new_results = int(payload.get("new_finished_matches", 0) or 0)
              if status == "deferred_active_group_matches":
                  heading = "DEFERRED"
                  detail = payload.get("message", "An active group match blocked publication.")
              elif new_results > 0:
                  heading = "PUBLISHED"
                  detail = f"{new_results} new completed match result(s) entered the official market."
              elif status in {"no_new_finished_match", "updated"}:
                  heading = "NO CHANGE"
                  detail = "No new completed match required a new official market publication."
              else:
                  heading = status.replace("_", " ").upper()
                  detail = payload.get("message", "Review the run summary for details.")

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write(f"## CupMarket update: {heading}\n\n")
              summary.write(f"{detail}\n\n")
              summary.write(f"- Trigger: {event_name}\n")
              summary.write(f"- Manual mode: {mode}\n")
              if payload.get("checked_at_utc"):
                  summary.write(f"- Checked: {payload['checked_at_utc']}\n")
              if payload.get("completed_at_utc"):
                  summary.write(f"- Completed: {payload['completed_at_utc']}\n")
          PY
        env:
          MANUAL_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'scheduled' }}

      - name: Commit updated model outputs
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data backend/state
          git reset -- backend/state/last_automation_run.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No model or market changes to commit."
            exit 0
          fi

          git fetch origin main
          remote_head=$(git rev-parse origin/main)
          if [ "$remote_head" != "$SOURCE_COMMIT" ]; then
            echo "Main changed while this run was calculating. Outputs were not published; the next scheduled run will recalculate from the newer code."
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> Publication deferred because main changed during the run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m "Auto-update CupMarket data"
          git push origin HEAD:main

      - name: Notify owner when automation fails
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket automation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          body="The CupMarket automatic update failed.\n\nRun: ${RUN_URL}\nEvent: ${{ github.event_name }}\nBranch: ${{ github.ref_name }}\nTime: $(date -u +'%Y-%m-%d %H:%M UTC')\n\nOpen the run above and inspect the first failed step."

          if [ -z "$issue_number" ]; then
            gh issue create \
              --title "CupMarket automation failure" \
              --body "$body" \
              --assignee "hayalows"
          else
            gh issue comment "$issue_number" --body "$body"
          fi

      - name: Close failure alert after recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket automation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" \
              --body "Automation recovered successfully. Run: ${RUN_URL}"
            gh issue close "$issue_number" --reason completed
          fi
