name: Update CupMarket data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: cupmarket-auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Validate repository package
        run: |
          test -f app.py
          test -f requirements.txt
          test -f data/cupmarket_prices_latest.csv
          test -f data/tournament_probabilities_latest.csv
          test -f data/current_group_tables.csv
          test -f backend/update_pipeline.py
          test -f backend/run_update_pipeline.py
          test -f backend/state/models/phase3_home_goal_model.joblib
          test -f backend/state/models/phase3_away_goal_model.joblib
          test -f backend/state/live_elo_ratings.csv
          test -f backend/state/live_team_state.csv
          test -f backend/state/world_cup_team_name_map.csv
          python -m py_compile app.py
          python -m py_compile backend/update_pipeline.py
          python -m py_compile backend/run_update_pipeline.py

      - name: Run CupMarket update pipeline
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          N_SIMULATIONS: "20000"
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: python backend/run_update_pipeline.py

      - name: Commit updated model outputs
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data backend/state
          git reset -- backend/state/last_automation_run.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No model or market changes to commit."
          else
            git commit -m "Auto-update CupMarket data"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Notify owner when automation fails
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket automation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          body="The CupMarket automatic update failed.\n\nRun: ${RUN_URL}\nEvent: ${{ github.event_name }}\nBranch: ${{ github.ref_name }}\nTime: $(date -u +'%Y-%m-%d %H:%M UTC')\n\nOpen the run above and inspect the first failed step."

          if [ -z "$issue_number" ]; then
            gh issue create \
              --title "CupMarket automation failure" \
              --body "$body" \
              --assignee "hayalows"
          else
            gh issue comment "$issue_number" --body "$body"
          fi

      - name: Close failure alert after recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket automation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" \
              --body "Automation recovered successfully. Run: ${RUN_URL}"
            gh issue close "$issue_number" --reason completed
          fi
