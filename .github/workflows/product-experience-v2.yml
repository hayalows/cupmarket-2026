name: Validate product experience v2

on:
  pull_request:
    paths:
      - features/product_ui.py
      - features/group_centre_page.py
      - pages/1_Match_Intelligence.py
      - pages/2_Qualification_Lab.py
      - pages/3_Live_Group_Centre.py
      - pages/4_Match_Hub.py
      - pages/Tournament_Pulse.py
      - assets/group_tools.css
      - .github/workflows/product-experience-v2.yml
  push:
    branches: [main]
    paths:
      - features/product_ui.py
      - features/group_centre_page.py
      - pages/1_Match_Intelligence.py
      - pages/2_Qualification_Lab.py
      - pages/3_Live_Group_Centre.py
      - pages/4_Match_Hub.py
      - pages/Tournament_Pulse.py
      - assets/group_tools.css
      - .github/workflows/product-experience-v2.yml

permissions:
  contents: read

jobs:
  validate-product-experience:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile product experience modules
        run: |
          python -m py_compile app.py
          python -m py_compile features/product_ui.py
          python -m py_compile features/match_hub_v2.py
          python -m py_compile features/group_centre_page.py
          python -m py_compile features/tournament_pulse_page.py
          python -m py_compile pages/1_Match_Intelligence.py
          python -m py_compile pages/2_Qualification_Lab.py
          python -m py_compile pages/3_Live_Group_Centre.py
          python -m py_compile pages/4_Match_Hub.py
          python -m py_compile pages/Tournament_Pulse.py

      - name: Run product and live projection tests
        run: |
          python -m unittest tests/test_group_scenarios.py
          python -m unittest tests/test_live_projection_smoke.py
          python -m unittest tests/test_live_match_data.py

      - name: Check patch quality
        run: git diff --check
