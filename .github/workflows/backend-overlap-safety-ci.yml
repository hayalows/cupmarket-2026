name: Validate overlap safety

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r backend/requirements.txt
      - run: python -m py_compile backend/update_pipeline.py tests/test_update_overlap_guard.py
      - run: python -m unittest tests.test_update_overlap_guard -v
      - run: git diff --check
