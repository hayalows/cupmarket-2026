name: Validate CupMarket UI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  validate-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install UI dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile all Python modules
        run: python -m compileall -q app.py pages features backend

      - name: Validate shared UI imports and page paths
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          product_ui_path = Path("features/product_ui.py")
          product_tree = ast.parse(product_ui_path.read_text(encoding="utf-8"))
          exports = set()
          for node in product_tree.body:
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                  exports.add(node.name)
              elif isinstance(node, (ast.Assign, ast.AnnAssign)):
                  targets = node.targets if isinstance(node, ast.Assign) else [node.target]
                  exports.update(
                      target.id for target in targets if isinstance(target, ast.Name)
                  )

          checked = []
          targets = [
              Path("app.py"),
              *Path("pages").glob("*.py"),
              *Path("features").glob("*.py"),
          ]
          for path in targets:
              tree = ast.parse(path.read_text(encoding="utf-8"))
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom) and node.module == "features.product_ui":
                      missing = [alias.name for alias in node.names if alias.name not in exports]
                      if missing:
                          raise SystemExit(
                              f"{path} imports missing product_ui symbols: {', '.join(missing)}"
                          )
                      checked.append(str(path))

          page_paths = [
              Path("pages/Tournament_Pulse.py"),
              Path("pages/1_Match_Intelligence.py"),
              Path("pages/2_Qualification_Lab.py"),
              Path("pages/3_Live_Group_Centre.py"),
              Path("pages/4_Match_Hub.py"),
              Path("pages/5_Market_Story.py"),
              Path("pages/6_Analytics_Dashboard.py"),
              Path("pages/7_Tournament_Path.py"),
              Path("pages/8_Bracket_View.py"),
              Path("pages/9_Model_Health.py"),
              Path("pages/10_Glossary.py"),
              Path("pages/11_Tournament_Insights.py"),
              Path("pages/12_Tournament_Simulator.py"),
              Path("pages/13_Tournament_Archive.py"),
              Path("pages/Country_Snapshot.py"),
          ]
          missing_pages = [str(path) for path in page_paths if not path.exists()]
          if missing_pages:
              raise SystemExit("Missing page files: " + ", ".join(missing_pages))

          print(f"Validated product_ui imports in {len(set(checked))} files.")
          print(f"Validated {len(page_paths)} page paths.")
          PY

      - name: Smoke test every user-facing page
        run: |
          pages=(
            pages/Tournament_Pulse.py
            pages/1_Match_Intelligence.py
            pages/2_Qualification_Lab.py
            pages/3_Live_Group_Centre.py
            pages/4_Match_Hub.py
            pages/5_Market_Story.py
            pages/6_Analytics_Dashboard.py
            pages/7_Tournament_Path.py
            pages/8_Bracket_View.py
            pages/9_Model_Health.py
            pages/10_Glossary.py
            pages/11_Tournament_Insights.py
            pages/12_Tournament_Simulator.py
            pages/13_Tournament_Archive.py
            pages/Country_Snapshot.py
          )
          for page in "${pages[@]}"; do
            echo "Testing ${page}..."
            python scripts/smoke_streamlit_page.py "${page}"
          done
          python scripts/smoke_streamlit_page.py pages/6_Analytics_Dashboard.py --analytics-performance

      - name: Notify owner when UI validation fails
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket UI validation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          details="No detailed page report was produced. Inspect the failed compile or import step."
          if [ -f ui-validation-failures.txt ]; then
            details=$(cat ui-validation-failures.txt)
          fi

          body=$(cat <<EOF
          CupMarket UI validation failed.

          Run: ${RUN_URL}
          Commit: ${{ github.sha }}
          Time: $(date -u +'%Y-%m-%d %H:%M UTC')

          Failure details:

          \`\`\`
          ${details}
          \`\`\`
          EOF
          )

          if [ -z "$issue_number" ]; then
            gh issue create \
              --title "CupMarket UI validation failure" \
              --body "$body" \
              --assignee "hayalows"
          else
            gh issue comment "$issue_number" --body "$body"
          fi

      - name: Close UI validation alert after recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket UI validation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body "UI validation recovered successfully on commit ${{ github.sha }}."
            gh issue close "$issue_number" --reason completed
          fi
