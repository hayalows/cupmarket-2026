name: Validate CupMarket UI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  validate-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install UI dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile all Python modules
        run: python -m compileall -q app.py pages features backend

      - name: Validate shared UI imports
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          product_ui_path = Path("features/product_ui.py")
          product_tree = ast.parse(product_ui_path.read_text(encoding="utf-8"))
          exports = {
              node.name
              for node in product_tree.body
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef))
          }

          checked = []
          targets = [
              Path("app.py"),
              *Path("pages").glob("*.py"),
              *Path("features").glob("*.py"),
          ]
          for path in targets:
              tree = ast.parse(path.read_text(encoding="utf-8"))
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom) and node.module == "features.product_ui":
                      missing = [alias.name for alias in node.names if alias.name not in exports]
                      if missing:
                          raise SystemExit(
                              f"{path} imports missing product_ui symbols: {', '.join(missing)}"
                          )
                      checked.append(str(path))

          print(f"Validated product_ui imports in {len(set(checked))} files.")
          PY

      - name: Smoke test every user-facing page
        run: |
          python - <<'PY'
          from pathlib import Path
          from streamlit.testing.v1 import AppTest

          pages = [
              Path("pages/Tournament_Pulse.py"),
              Path("pages/1_Match_Intelligence.py"),
              Path("pages/2_Qualification_Lab.py"),
              Path("pages/3_Live_Group_Centre.py"),
              Path("pages/4_Match_Hub.py"),
              Path("pages/5_Market_Story.py"),
              Path("pages/6_Analytics_Dashboard.py"),
          ]

          failures = []
          for page in pages:
              print(f"Testing {page}...")
              app = AppTest.from_file(str(page), default_timeout=60)
              app.run()
              if app.exception:
                  failures.append(f"{page}: {app.exception}")

          if failures:
              raise SystemExit("\n".join(failures))
          print(f"Rendered {len(pages)} pages without Streamlit exceptions.")
          PY

      - name: Notify owner when UI validation fails
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket UI validation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          body="CupMarket UI validation failed.\n\nRun: ${RUN_URL}\nCommit: ${{ github.sha }}\nTime: $(date -u +'%Y-%m-%d %H:%M UTC')\n\nInspect the failed compile, import, or Streamlit page smoke-test step."

          if [ -z "$issue_number" ]; then
            gh issue create \
              --title "CupMarket UI validation failure" \
              --body "$body" \
              --assignee "hayalows"
          else
            gh issue comment "$issue_number" --body "$body"
          fi

      - name: Close UI validation alert after recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "CupMarket UI validation failure in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body "UI validation recovered successfully on commit ${{ github.sha }}."
            gh issue close "$issue_number" --reason completed
          fi
