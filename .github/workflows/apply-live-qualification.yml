name: Apply live qualification UI
on:
  push:
    branches: [main]
    paths:
      - "backend/live_qualification.py"
      - "features/live_qualification_ui.py"
      - "scripts/apply_live_qualification_patch.py"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/apply_live_qualification_patch.py
      - run: python -m py_compile features/qualification_ui.py features/match_ui.py
      - run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add features/qualification_ui.py features/match_ui.py
          if ! git diff --cached --quiet; then
            git commit -m "Integrate live qualification interface"
            git pull --rebase origin main
            git push origin main
          fi
