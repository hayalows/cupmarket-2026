name: Apply product UI refresh

on:
  push:
    branches:
      - main
    paths:
      - "scripts/apply_product_ui_patch.py"
      - "assets/product.css"
      - ".streamlit/config.toml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cupmarket-product-ui
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply product UI patch
        run: python scripts/apply_product_ui_patch.py

      - name: Validate Streamlit app
        run: |
          python -m py_compile app.py
          grep -q 'PRODUCT_UI_VERSION = "1.0"' app.py
          grep -q "Tournament intelligence" app.py
          test -f assets/product.css
          test -f .streamlit/config.toml

      - name: Commit refreshed interface
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app.py

          if git diff --cached --quiet; then
            echo "Product UI refresh was already present."
          else
            git commit -m "Refresh CupMarket product interface"
            git pull --rebase origin main
            git push origin main
          fi
