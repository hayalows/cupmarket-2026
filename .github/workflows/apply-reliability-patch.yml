name: Apply CupMarket reliability patch

on:
  push:
    branches: [main]
    paths:
      - "scripts/apply_reliability_patch.py"
      - ".github/workflows/apply-reliability-patch.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: cupmarket-reliability-patch
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install joblib==1.5.3 scipy==1.16.3 scikit-learn==1.6.1

      - name: Apply reliability patch
        run: python scripts/apply_reliability_patch.py

      - name: Compile application
        run: python -m compileall -q app.py pages features backend tests

      - name: Run complete unit test suite
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee unit-test.log
          code=${PIPESTATUS[0]}
          exit ${code}

      - name: Smoke test every Streamlit page
        run: |
          pages=(
            pages/Tournament_Pulse.py
            pages/1_Match_Intelligence.py
            pages/2_Qualification_Lab.py
            pages/3_Live_Group_Centre.py
            pages/4_Match_Hub.py
            pages/5_Market_Story.py
            pages/6_Analytics_Dashboard.py
            pages/7_Tournament_Path.py
            pages/8_Bracket_View.py
            pages/9_Model_Health.py
            pages/10_Glossary.py
            pages/11_Tournament_Insights.py
            pages/12_Tournament_Simulator.py
            pages/13_Tournament_Archive.py
            pages/Country_Snapshot.py
          )
          for page in "${pages[@]}"; do
            echo "Testing ${page}..."
            python scripts/smoke_streamlit_page.py "${page}"
          done
          python scripts/smoke_streamlit_page.py pages/6_Analytics_Dashboard.py --analytics-performance

      - name: Record successful validation
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          import json
          from pathlib import Path

          payload = {
              "status": "passed",
              "validated_at_utc": datetime.now(timezone.utc).isoformat(),
              "source_commit": "${{ github.sha }}",
              "checks": [
                  "compileall",
                  "complete unittest discovery",
                  "all Streamlit page smoke tests",
                  "analytics performance smoke test",
              ],
              "protected_logic": [
                  "performance-adjusted eliminated-country settlement premiums unchanged"
              ],
          }
          Path("data/reliability_patch_validation.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY

      - name: Remove one-time patch machinery
        run: |
          rm -f scripts/apply_reliability_patch.py
          rm -f .github/workflows/apply-reliability-patch.yml

      - name: Publish validated reliability patch
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Harden CupMarket stage logic and adaptive safeguards"
          git pull --rebase origin main
          git push origin main

      - name: Report failure details
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          details="No unit-test log was produced. Inspect the failed workflow step."
          if [ -f unit-test.log ]; then
            details=$(tail -n 180 unit-test.log)
          fi
          body=$(cat <<EOF
          Reliability validation failed on run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.

          No application patch was published.

          Test output:

          \`\`\`
          ${details}
          \`\`\`
          EOF
          )
          gh issue edit 50 --body "$body"
