name: Validate production health layer

on:
  pull_request:
    paths:
      - app.py
      - features/live_match_data.py
      - features/live_group_table.py
      - features/match_ui.py
      - features/qualification_ui.py
      - pages/1_Match_Intelligence.py
      - pages/2_Qualification_Lab.py
      - .github/workflows/health-layer-ci.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate Streamlit app and live-score tools
        run: |
          python -m py_compile app.py
          python -m py_compile features/live_match_data.py
          python -m py_compile features/live_group_table.py
          python -m py_compile features/match_ui.py
          python -m py_compile features/qualification_ui.py
          python -m py_compile pages/1_Match_Intelligence.py
          python -m py_compile pages/2_Qualification_Lab.py
          python -m unittest tests/test_live_match_data.py
          python -m unittest tests/test_group_scenarios.py
          grep -q "Production pipeline" app.py
          grep -q "Last successful run" app.py
          grep -q "Data-staleness warning" app.py
          grep -q "build_production_health" app.py
          git diff --check
