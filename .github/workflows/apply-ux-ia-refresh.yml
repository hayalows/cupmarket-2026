name: Apply CupMarket UX and information architecture refresh

on:
  push:
    branches: [main]
    paths:
      - "scripts/apply_ux_ia_refresh.py"
      - ".github/workflows/apply-ux-ia-refresh.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: cupmarket-ux-ia-refresh
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install joblib==1.5.3 scipy==1.16.3 scikit-learn==1.6.1

      - name: Compile patch script
        shell: bash
        run: |
          set +e
          python -m py_compile scripts/apply_ux_ia_refresh.py 2>&1 | tee patch-compile.log
          code=${PIPESTATUS[0]}
          exit ${code}

      - name: Apply UX and architecture patch
        shell: bash
        run: |
          rm -f patch-apply.log
          set +e
          python scripts/apply_ux_ia_refresh.py 2>&1 | tee patch-apply.log
          code=${PIPESTATUS[0]}
          exit ${code}

      - name: Compile application
        shell: bash
        run: |
          rm -f application-compile.log
          set +e
          python -m compileall -q app.py pages features backend tests 2>&1 | tee application-compile.log
          code=${PIPESTATUS[0]}
          exit ${code}

      - name: Run complete unit test suite
        shell: bash
        run: |
          rm -f unit-test.log
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee unit-test.log
          code=${PIPESTATUS[0]}
          exit ${code}

      - name: Smoke test every Streamlit page
        shell: bash
        run: |
          rm -f page-smoke.log
          set +e
          pages=(
            pages/Tournament_Pulse.py
            pages/1_Match_Intelligence.py
            pages/2_Qualification_Lab.py
            pages/3_Live_Group_Centre.py
            pages/4_Match_Hub.py
            pages/5_Market_Story.py
            pages/6_Analytics_Dashboard.py
            pages/7_Tournament_Path.py
            pages/8_Bracket_View.py
            pages/9_Model_Health.py
            pages/10_Glossary.py
            pages/11_Tournament_Insights.py
            pages/12_Tournament_Simulator.py
            pages/13_Tournament_Archive.py
            pages/Country_Snapshot.py
          )
          code=0
          for page in "${pages[@]}"; do
            echo "Testing ${page}..." | tee -a page-smoke.log
            python scripts/smoke_streamlit_page.py "${page}" 2>&1 | tee -a page-smoke.log
            result=${PIPESTATUS[0]}
            if [ ${result} -ne 0 ]; then
              code=${result}
              break
            fi
          done
          if [ ${code} -eq 0 ]; then
            python scripts/smoke_streamlit_page.py pages/6_Analytics_Dashboard.py --analytics-performance 2>&1 | tee -a page-smoke.log
            code=${PIPESTATUS[0]}
          fi
          exit ${code}

      - name: Record successful validation
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          import json
          from pathlib import Path

          payload = {
              "status": "passed",
              "validated_at_utc": datetime.now(timezone.utc).isoformat(),
              "source_commit": "${{ github.sha }}",
              "checks": [
                  "patch script compilation",
                  "patch application",
                  "application compilation",
                  "complete unit test discovery",
                  "all Streamlit page smoke tests",
                  "analytics performance smoke test",
                  "navigation contract",
                  "information architecture contract",
              ],
              "product_changes": [
                  "one responsibility per visible page",
                  "plain-language headings and navigation",
                  "simulator removed from Overview",
                  "Countries restricted to selected-country content",
                  "Analysis separated from Archive",
                  "market deep links routed into Countries",
              ],
              "protected_logic": [
                  "pricing and performance-adjusted settlement logic unchanged",
                  "simulation and prediction mathematics unchanged",
              ],
          }
          Path("data/ux_ia_validation.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY

      - name: Remove one-time release machinery
        run: |
          rm -f scripts/apply_ux_ia_refresh.py
          rm -f .github/workflows/apply-ux-ia-refresh.yml
          rm -f patch-compile.log patch-apply.log application-compile.log unit-test.log page-smoke.log

      - name: Publish validated UX release
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Clarify CupMarket writing and information architecture"
          git pull --rebase origin main
          git push origin main

      - name: Report failure
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          details="No diagnostic log was produced. Inspect the failed workflow step."
          log_name=""
          for candidate in patch-apply.log patch-compile.log application-compile.log unit-test.log page-smoke.log; do
            if [ -s "$candidate" ]; then
              log_name="$candidate"
              details=$(tail -n 190 "$candidate")
              break
            fi
          done
          body=$(cat <<EOF
          The CupMarket UX and information architecture release failed validation.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          No validated application release was published.

          Diagnostic source: ${log_name:-none}

          \`\`\`
          ${details}
          \`\`\`
          EOF
          )
          existing=$(gh issue list --state open --search 'CupMarket UX architecture validation failed in:title' --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
          else
            gh issue create --title "CupMarket UX architecture validation failed" --body "$body" --assignee hayalows
          fi
