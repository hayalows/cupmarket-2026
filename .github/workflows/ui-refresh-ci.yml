name: Validate product UI refresh

on:
  pull_request:
    paths:
      - app.py
      - assets/**
      - features/product_ui.py
      - pages/**
      - .streamlit/config.toml
      - tests/test_navigation_contract.py
      - .github/workflows/ui-refresh-ci.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate current product interface
        run: |
          test -f assets/product.css
          test -f assets/group_tools.css
          test -f .streamlit/config.toml
          test -f features/product_ui.py
          python -m py_compile app.py
          python -m py_compile features/product_ui.py
          python -m py_compile pages/1_Match_Intelligence.py
          python -m py_compile pages/2_Qualification_Lab.py
          python -m py_compile pages/3_Live_Group_Centre.py
          python -m unittest tests/test_navigation_contract.py
          grep -q 'PRODUCT_UI_VERSION = "2.0"' app.py
          grep -q "Papa Kojo Mensah" features/product_ui.py
          grep -q "render_project_footer" app.py
          grep -q "Live tools" app.py
          grep -q 'icon="🧭"' features/product_ui.py
          grep -q 'icon="📊"' features/product_ui.py
          grep -q "showSidebarNavigation = false" .streamlit/config.toml
          git diff --check
