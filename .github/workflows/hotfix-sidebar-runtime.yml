name: Apply sidebar runtime hotfix

on:
  push:
    branches:
      - hotfix-sidebar-runtime
    paths:
      - scripts/hotfix_sidebar_runtime.py
      - .github/workflows/hotfix-sidebar-runtime.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v4
        with:
          ref: hotfix-sidebar-runtime
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply runtime hotfix
        run: python scripts/hotfix_sidebar_runtime.py

      - name: Validate Python modules
        run: |
          python -m py_compile app.py
          python -m py_compile features/product_ui.py
          python -m py_compile pages/1_Match_Intelligence.py
          python -m py_compile pages/2_Qualification_Lab.py
          python -m py_compile pages/3_Live_Group_Centre.py

      - name: Validate navigation contract
        run: |
          ! grep -R 'icon="◇"' app.py features pages
          ! grep -R 'icon="◉"' app.py features pages
          grep -q 'icon="🧭"' app.py
          grep -q 'icon="📊"' app.py
          grep -q 'showSidebarNavigation = false' .streamlit/config.toml
          git diff --check

      - name: Run existing UI and live tests
        run: |
          python -m unittest tests/test_group_scenarios.py
          python -m unittest tests/test_live_projection_smoke.py

      - name: Commit hotfix
        run: |
          git config user.name "cupmarket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app.py features/product_ui.py scripts/apply_product_experience_refresh.py .streamlit/config.toml

          if git diff --cached --quiet; then
            echo "Hotfix already applied."
          else
            git commit -m "Fix Streamlit sidebar runtime error"
            git push origin hotfix-sidebar-runtime
          fi
